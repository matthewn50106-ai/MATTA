<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MATTA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background-color:#111;min-height:100vh;font-family:'Playfair Display',Georgia,serif;color:#fff;font-size:16px;}#app{background:#111;min-height:100vh;}
button,a{font-family:inherit;}
.card{transition:transform 0.35s ease,box-shadow 0.35s ease;}
.card:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(0,0,0,0.13)!important;}
.nav-btn{transition:background 0.2s;}
.nav-btn:hover{background:rgba(255,255,255,0.08)!important;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}
.btn-enter{transition:opacity 0.2s;}.btn-enter:hover{opacity:0.8;}.btn-enter:focus{outline:none !important;box-shadow:none !important;}
#buy-btn:not(.size-error):hover{background:linear-gradient(135deg,#555,#888) !important;color:#fff !important;}
#buy-btn.size-error{background:rgba(255,0,0,0.12) !important;color:#ff6b6b !important;border:1px solid rgba(255,100,100,0.6) !important;}
img{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}

/* ── Mobile hamburger ── */
.mob-menu-open .mob-nav-drawer{transform:translateX(0)!important;}
.mob-nav-drawer{position:fixed;top:0;left:0;height:100vh;width:75vw;max-width:300px;background:#181818;border-right:1px solid rgba(255,255,255,0.1);z-index:200;transform:translateX(-100%);transition:transform 0.3s ease;padding:80px 28px 40px;display:flex;flex-direction:column;gap:8px;}
.mob-overlay{display:none;position:fixed;inset:0;z-index:199;background:rgba(0,0,0,0.6);}
.mob-menu-open .mob-overlay{display:block;}

@media(max-width:640px){
  /* Nav */
  .desktop-nav-center{display:none!important;}
  .desktop-login-btns{display:none!important;}
  .mob-hamburger{display:flex!important;}
  .mob-username-label{display:none!important;}

  /* Pages general */
  .page-wrap{padding-left:16px!important;padding-right:16px!important;}

  /* Shop grid → 2 columns */
  .shop-grid{grid-template-columns:repeat(2,1fr)!important;gap:12px!important;}

  /* Home trending grid → 2 columns */
  .trending-grid{grid-template-columns:repeat(2,1fr)!important;gap:12px!important;}

  /* Product detail → stack */
  .detail-row{flex-direction:column!important;gap:24px!important;}
  .detail-preview-col{min-width:unset!important;width:100%!important;}
  .detail-info-col{min-width:unset!important;width:100%!important;}

  /* Rants → stack sidebar below */
  .rants-layout{flex-direction:column!important;gap:20px!important;}
  .rants-sidebar{width:100%!important;position:static!important;top:unset!important;}

  /* About facts grid → 2 col */
  .about-facts-grid{grid-template-columns:repeat(2,1fr)!important;}

  /* Podcast hero padding */
  .podcast-hero{padding:36px 20px!important;}

  /* Modals full-width */
  .modal-box{width:calc(100vw - 32px)!important;padding:28px 20px!important;border-radius:18px!important;}

  /* Shop culture tabs → scroll */
  .culture-tabs{overflow-x:auto!important;-webkit-overflow-scrolling:touch!important;justify-content:flex-start!important;width:100%!important;}
  .culture-tabs::-webkit-scrollbar{display:none;}

  /* Filter/sort row → wrap */
  .filter-row{flex-wrap:wrap!important;gap:8px!important;}

  /* Size buttons → slightly smaller */
  .size-btn{padding:8px 12px!important;font-size:13px!important;}

  /* Thumbnails row → scroll */
  .thumb-row{overflow-x:auto!important;-webkit-overflow-scrolling:touch!important;}
  .thumb-row::-webkit-scrollbar{display:none;}
}
</style>
</head>

function el(tag,props,...kids){
  const e=document.createElement(tag);
  if(props) for(const[k,v] of Object.entries(props)){
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")&&typeof v==="function") e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className") e.className=v;
    else e.setAttribute(k,v);
  }
  for(const c of kids.flat(9)){
    if(c==null||c===false||c===undefined) continue;
    e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  }
  return e;
}

      row.style.borderColor=on?"rgba(255,255,255,0.35)":"rgba(255,255,255,0.12)";

    catWrap.style.display=expanded?"block":"none";

  sidebar.appendChild(sideLabel);

  const tagBtns={};
  allTags.forEach(tag=>{
    const tb=btn({style:{display:"block",width:"100%",textAlign:"left",padding:"9px 14px",borderRadius:"12px",marginBottom:"8px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",color:"#fff",fontSize:"12px",fontWeight:"600",letterSpacing:"0.5px",cursor:"pointer",fontFamily:"inherit",transition:"all 0.18s"}},tag);
    tb.addEventListener("mouseenter",()=>{if(!activeTags.has(tag))tb.style.background="rgba(255,255,255,0.08)";});

  // Clear button

      if(para.trim()) body.appendChild(p_({style:{fontSize:"15px",color:"#fff",lineHeight:"1.85",marginBottom:"16px"}},para.trim()));
    });

    const likeRow=div({style:{display:"flex",alignItems:"center",gap:"10px",padding:"16px 28px 20px",borderTop:"1px solid rgba(255,255,255,0.05)",marginTop:"8px"}});

  layout.appendChild(postsCol);

  function updateFilter(){
    // Update tag button styles
    allTags.forEach(tag=>{
      const active=activeTags.has(tag);
      tagBtns[tag].style.background=active?"rgba(81,81,245,0.25)":"rgba(255,255,255,0.04)";

      card.style.display=show?"":"none";
      if(show) visible++;
    });
    noResults.style.display=visible===0?"block":"none";
  }

  return outerWrap;
}

  wrap.appendChild(div({style:{borderRadius:"20px",padding:"36px",textAlign:"center",background:"linear-gradient(135deg,#8515f5,#5151f5)",color:"#fff"}},

    p_({style:{fontSize:"15px",opacity:"0.85",lineHeight:"1.7",maxWidth:"520px",margin:"0 auto"}},"Stay tuned for more updates and new releases every month!")
  ));
  return wrap;
}

window.addEventListener("pageshow",function(e){
  document.querySelectorAll("[data-lightbox]").forEach(el=>el.remove());
});
function render(){
  const root=document.getElementById("app");
  root.innerHTML="";
  // Always remove any open lightbox when re-rendering
  document.querySelectorAll("[data-lightbox]").forEach(el=>el.remove());
  // Clean up mobile drawer on re-render
  document.body.classList.remove("mob-menu-open");
  document.querySelectorAll(".mob-nav-drawer,.mob-overlay").forEach(el=>el.remove());
  window.scrollTo(0,0);
  if(state.page==="splash"){root.appendChild(SplashPage());return;}
  root.appendChild(NavBar());
  if(state.page==="home") root.appendChild(HomePage());
  else if(state.page==="shop") root.appendChild(ShopPage());
  else if(state.page==="podcast") root.appendChild(PodcastsPage());
  else if(state.page==="rants") root.appendChild(RantsPage());
  else if(state.page==="about") root.appendChild(AboutPage());
}
render();
</script>
